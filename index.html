<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%233182F6'/%3E%3Cpath d='M30 45 L45 60 L75 30' fill='none' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Lectoss - 프리랜서 강의료 정산 대시보드</title>
    <!-- Pretendard Web Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <script>
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = '#fee2e2';
        errorDiv.style.color = '#991b1b';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '12px';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.style.borderBottom = '4px solid #ef4444';
        errorDiv.innerHTML = '<strong>[Runtime Error Catch]</strong><br/>' + event.message + '<br/>Source: ' + event.filename + ':' + event.lineno + ':' + event.colno + '<br/><br/>Stack Trace:<br/>' + (event.error ? event.error.stack : 'No stack trace');
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.background = '#fef3c7';
        errorDiv.style.color = '#92400e';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '999999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '12px';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.style.borderBottom = '4px solid #f59e0b';
        errorDiv.innerHTML = '<strong>[Promise Rejection Catch]</strong><br/>' + event.reason;
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased selection:bg-blue-100 selection:text-blue-800">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
