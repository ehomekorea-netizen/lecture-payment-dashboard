<!doctype html>
<html lang="ko" style="background-color:#1F2E5B;">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Apple Mobile Web App Metadata for iOS Home Screen Shortcut -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="출강바이브" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="출강바이브 - 출강 기록부터 강의료 정산까지, 프리랜서를 위한 스마트 대시보드">
    <title>출강바이브 - 출강 기록부터 강의료 정산까지, 프리랜서를 위한 스마트 대시보드</title>
    <!-- Open Graph Metadata -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="출강바이브" />
    <meta property="og:description" content="출강 기록부터 강의료 정산까지, 프리랜서를 위한 스마트 대시보드" />
    <meta property="og:image" content="https://lecture-payment-dashboard.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="600" />
    <meta property="og:url" content="https://lecture-payment-dashboard.vercel.app/" />
    <!-- Pretendard Web Font (DESIGN.md: display.family) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" /></noscript>
    <script>
      // DESIGN.md: FOUC Prevention — html background stays #1F2E5B until CSS loads
      document.documentElement.style.backgroundColor = '#1F2E5B';
      window.addEventListener('error', function(event) {
        var errorDiv = document.createElement('div');
        errorDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#fee2e2;color:#991b1b;padding:20px;z-index:999999;font-family:monospace;font-size:12px;white-space:pre-wrap;border-bottom:4px solid #ef4444;';
        errorDiv.innerHTML = '<strong>[Runtime Error]</strong><br/>' + event.message + '<br/>Source: ' + event.filename + ':' + event.lineno;
        document.body.appendChild(errorDiv);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
